name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Version consistency
        run: node scripts/check-version.mjs

      # Resources must exist before any cargo invocation — tauri-build
      # validates bundle resources in the build script.
      - name: Vendor CLI (with Windows patches)
        run: node scripts/vendor-cli.mjs

      - name: Bundle Node runtime
        run: node scripts/fetch-node.mjs

      - name: Tests
        run: |
          pnpm test
          cargo test --workspace

      - name: Build Tauri app without bundle
        shell: pwsh
        run: pnpm tauri build --no-bundle

      - name: Sign app exe with SignPath
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          & "./scripts/signpath-sign-artifact.ps1" `
            -InputArtifactPath "target/release/vibe-usage-app.exe" `
            -OutputArtifactPath "signpath/signed-app/vibe-usage-app.exe" `
            -Description "Vibe Usage app $env:GITHUB_SHA"

      - name: Replace app exe with signed app exe
        shell: pwsh
        run: |
          $signed = Get-Item "signpath/signed-app/vibe-usage-app.exe"
          if (-not $signed) {
            throw "Signed app exe not found."
          }
          Copy-Item $signed.FullName "target/release/vibe-usage-app.exe" -Force

      - name: Bundle NSIS installer
        shell: pwsh
        run: pnpm tauri bundle --bundles nsis

      - name: Prepare unsigned installer for SignPath
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installer = Get-ChildItem -Path "target/release/bundle/nsis" -Filter "*$version*setup.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer not found."
          }

          New-Item -ItemType Directory -Force -Path "signpath/installer" | Out-Null
          Copy-Item $installer.FullName "signpath/installer/VibeUsage-Windows-Setup.exe" -Force

      - name: Sign installer with SignPath
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          & "./scripts/signpath-sign-artifact.ps1" `
            -InputArtifactPath "signpath/installer/VibeUsage-Windows-Setup.exe" `
            -OutputArtifactPath "signpath/signed-installer/VibeUsage-Windows-Setup.exe" `
            -Description "Vibe Usage installer $env:GITHUB_SHA"

      - name: Collect signed artifacts
        id: artifacts
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $signedInstaller = Get-ChildItem "signpath/signed-installer" -Recurse -Filter "VibeUsage-Windows-Setup.exe" | Select-Object -First 1

          if (-not $signedInstaller) {
            throw "Signed installer not found."
          }

          $dest = "VibeUsage-$version-Windows-Setup.exe"
          Copy-Item $signedInstaller.FullName $dest -Force

          node scripts/generate-updater-manifest.mjs $dest
          "installer=$dest" >> $env:GITHUB_OUTPUT

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.installer }}
            latest.json

      # Installer and updater manifest are separate artifacts so testers
      # download a zip containing exactly one obvious .exe.
      - name: Upload installer artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ steps.artifacts.outputs.installer }}

      - name: Upload updater manifest artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: updater-manifest
          path: latest.json
