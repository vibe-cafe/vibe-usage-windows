name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Version consistency
        run: node scripts/check-version.mjs

      # Resources must exist before any cargo invocation — tauri-build
      # validates bundle resources in the build script.
      - name: Vendor CLI (with Windows patches)
        run: node scripts/vendor-cli.mjs

      - name: Bundle Node runtime
        run: node scripts/fetch-node.mjs

      - name: Tests
        run: |
          pnpm test
          cargo test --workspace

      - name: Build NSIS installer
        run: pnpm tauri build --bundles nsis

      - name: Collect artifacts
        id: artifacts
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installer = Get-ChildItem "target/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          $dest = "VibeUsage-$version-Windows-Setup.exe"
          Copy-Item $installer.FullName $dest
          node scripts/generate-updater-manifest.mjs $dest
          "installer=$dest" >> $env:GITHUB_OUTPUT

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.installer }}
            latest.json

      - name: Upload workflow artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            ${{ steps.artifacts.outputs.installer }}
            latest.json
