name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Version consistency
        run: node scripts/check-version.mjs

      # Resources must exist before any cargo invocation — tauri-build
      # validates bundle resources in the build script.
      - name: Vendor CLI (with Windows patches)
        run: node scripts/vendor-cli.mjs

      - name: Bundle Node runtime
        run: node scripts/fetch-node.mjs

      - name: Tests
        run: |
          pnpm test
          cargo test --workspace

      - name: Build signed NSIS installer
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ALLOW_UNTRUSTED_SIGNATURE: "true"
        run: ./scripts/build-tauri-windows.ps1

      - name: Collect signed artifacts
        id: artifacts
        shell: pwsh
        env:
          SIGNPATH_ALLOW_UNTRUSTED_SIGNATURE: "true"
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installer = Get-ChildItem -Path "target/release/bundle/nsis" -Filter "*$version*setup.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "NSIS installer not found."
          }

          foreach ($artifact in @($installer.FullName)) {
            $signature = Get-AuthenticodeSignature -FilePath $artifact
            $signatureStatus = $signature.Status.ToString()
            if ($signatureStatus -eq "NotSigned" -or $signatureStatus -eq "HashMismatch") {
              throw "Invalid Authenticode signature for ${artifact}: $($signature.Status). $($signature.StatusMessage)"
            }
            if ($signatureStatus -ne "Valid") {
              $message = "Untrusted Authenticode signature for ${artifact}: $($signature.Status). $($signature.StatusMessage)"
              if ($env:SIGNPATH_ALLOW_UNTRUSTED_SIGNATURE -match '^(1|true|yes|on)$') {
                Write-Warning $message
              } else {
                throw $message
              }
            }
            Write-Host "Verified Authenticode signature: $artifact"
          }

          $dest = "VibeUsage-$version-Windows-Setup.exe"
          Copy-Item $installer.FullName $dest -Force

          node scripts/generate-updater-manifest.mjs $dest
          "installer=$dest" >> $env:GITHUB_OUTPUT

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.installer }}
            latest.json

      # Installer and updater manifest are separate artifacts so testers
      # download a zip containing exactly one obvious .exe.
      - name: Upload installer artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ steps.artifacts.outputs.installer }}

      - name: Upload updater manifest artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: updater-manifest
          path: latest.json
