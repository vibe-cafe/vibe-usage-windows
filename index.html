<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Usage</title>
    <!--
      The popover window is transparent + frameless; paint the rounded dark
      card at the earliest possible moment so the first frame never flashes
      white (WebView2 quirk — same mitigation ATM uses).
    -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
      }
      #root {
        width: 520px;
        height: 620px;
        border-radius: 12px;
        background: #0a0a0a;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
